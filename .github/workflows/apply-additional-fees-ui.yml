name: Apply additional fees UI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'Apply additional fees UI') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch settings and settlements pages
        run: |
          node <<'NODE'
          const fs = require('fs');
          const workflowPath = '.github/workflows/apply-additional-fees-ui.yml';

          const settingsPath = 'src/app/uzytkownicy/page.tsx';
          let settings = fs.readFileSync(settingsPath, 'utf8');
          if (!settings.includes('AdditionalFeesSettingsPanel')) {
            settings = settings.replace('import AccessGuard from "@/components/AccessGuard";\n', 'import AccessGuard from "@/components/AccessGuard";\nimport AdditionalFeesSettingsPanel from "@/components/AdditionalFeesSettingsPanel";\n');
          }
          settings = settings.replace('type SettingsTab = "templates" | "users";', 'type SettingsTab = "templates" | "fees" | "users";');
          settings = settings.replace('Szablony cykliczne i użytkownicy aplikacji.', 'Szablony cykliczne, opłaty dodatkowe i użytkownicy aplikacji.');
          if (!settings.includes('onClick={() => setActiveTab("fees")}')) {
            settings = settings.replace(
              '        <button style={activeTab === "templates" ? activeTabStyle : tabStyle} onClick={() => setActiveTab("templates")}>Szablony cykliczne</button>\n',
              '        <button style={activeTab === "templates" ? activeTabStyle : tabStyle} onClick={() => setActiveTab("templates")}>Szablony cykliczne</button>\n        <button style={activeTab === "fees" ? activeTabStyle : tabStyle} onClick={() => setActiveTab("fees")}>Opłaty dodatkowe</button>\n'
            );
          }
          settings = settings.replace(
            '      ) : (\n        <UsersTab users={users} loading={loading} onRoleChange={updateUserRole} />\n      )}',
            '      ) : activeTab === "fees" ? (\n        <AdditionalFeesSettingsPanel />\n      ) : (\n        <UsersTab users={users} loading={loading} onRoleChange={updateUserRole} />\n      )}'
          );
          fs.writeFileSync(settingsPath, settings, 'utf8');

          const settlementsPath = 'src/app/rozliczenia/page.tsx';
          let settlements = fs.readFileSync(settlementsPath, 'utf8');
          if (!settlements.includes('SettlementAdditionalFeesPanel')) {
            settlements = settlements.replace('import AccessGuard from "@/components/AccessGuard";\n', 'import AccessGuard from "@/components/AccessGuard";\nimport SettlementAdditionalFeesPanel from "@/components/SettlementAdditionalFeesPanel";\n');
          }
          if (!settlements.includes('<SettlementAdditionalFeesPanel settlementId={settlement.id} />')) {
            settlements = settlements.replace(
              '          </section>\n\n          <section style={drawerSectionStyle}>\n            <h3 style={drawerSectionTitleStyle}>Zadania cykliczne</h3>',
              '          </section>\n\n          <SettlementAdditionalFeesPanel settlementId={settlement.id} />\n\n          <section style={drawerSectionStyle}>\n            <h3 style={drawerSectionTitleStyle}>Zadania cykliczne</h3>'
            );
          }
          fs.writeFileSync(settlementsPath, settlements, 'utf8');

          fs.rmSync(workflowPath, { force: true });
          NODE

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/uzytkownicy/page.tsx src/app/rozliczenia/page.tsx .github/workflows/apply-additional-fees-ui.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply additional fees UI"
            git push
          fi
