name: Apply CRM PDF cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message, 'Zastosuj porzadki ofert PDF') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove old offer panel and add cleanup migration
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          crm_path = Path('src/app/crm/page.tsx')
          crm = crm_path.read_text(encoding='utf-8')

          # Remove offer service imports from the main CRM drawer. PDF offers live in /crm/oferty.
          crm = re.sub(
              r'import \{\n  createCrmOffer,\n  fetchCrmOfferEvents,\n  fetchCrmOffers,\n  publishCrmOffer,\n  updateCrmOffer,\n  type CrmOffer,\n  type CrmOfferEvent,\n  type CrmOfferPayload,\n\} from "@/lib/crmOfferService";\n',
              '',
              crm,
              count=1,
          )

          # Remove the old editable-offer draft type.
          crm = re.sub(
              r'\ntype OfferDraft = \{.*?\};\n\nconst EMPTY_FILTER =',
              '\nconst EMPTY_FILTER =',
              crm,
              count=1,
              flags=re.S,
          )

          # Remove old offer state and draft from LeadDrawer.
          crm = re.sub(
              r'  const \[offer, setOffer\] = useState<CrmOffer \| null>\(null\);\n  const \[offerEvents, setOfferEvents\] = useState<CrmOfferEvent\[\]>\(\[\]\);\n  const \[offerLoading, setOfferLoading\] = useState\(mode === "edit"\);\n  const \[offerSaving, setOfferSaving\] = useState\(false\);\n  const \[offerDraft, setOfferDraft\] = useState<OfferDraft>\(\(\) =>\n    createOfferDraftFromLead\(lead\)\n  \);\n',
              '',
              crm,
              count=1,
          )

          # Stop loading the old offer data in the drawer.
          crm = crm.replace('      loadOffer();\n', '', 1)
          crm = crm.replace('    setOffer(null);\n    setOfferEvents([]);\n    setOfferLoading(false);\n', '', 1)

          # Remove old offer helper functions inside LeadDrawer.
          crm = re.sub(
              r'\n  function updateOfferDraft<K extends keyof OfferDraft>\(key: K, value: OfferDraft\[K\]\) \{.*?\n  async function loadDocuments\(\) \{',
              '\n  async function loadDocuments() {',
              crm,
              count=1,
              flags=re.S,
          )

          # Replace the old rendered panel with a simple link to the new PDF-first screen.
          crm = re.sub(
              r'          <FormSection title="Oferta interaktywna">.*?          </FormSection>\n\n          <FormSection title="Pliki">',
              '''          <FormSection title="Oferta PDF">
            {mode === "create" ? (
              <div style={emptyTaskStyle}>Najpierw zapisz szansę, a potem przejdź do ofert PDF.</div>
            ) : (
              <div style={offerPanelStyle}>
                <div style={offerHeaderStyle}>
                  <div>
                    <div style={fileDropzoneTitleStyle}>Oferta PDF i śledzenie klienta</div>
                    <div style={fileDropzoneDescriptionStyle}>PDF, prywatny link, statystyki stron, CTA i wysyłka przez n8n są teraz w osobnym ekranie.</div>
                  </div>
                  <a href="/crm/oferty" style={secondaryButtonStyle}>Przejdź do ofert</a>
                </div>
              </div>
            )}
          </FormSection>

          <FormSection title="Pliki">''',
              crm,
              count=1,
              flags=re.S,
          )

          # Remove old helper functions that built section-based offers.
          crm = re.sub(
              r'\nfunction createOfferDraftFromLead\(lead\?: Lead\): OfferDraft \{.*?\nfunction createDraft\(lead: Lead\): LeadDraft \{',
              '\nfunction createDraft(lead: Lead): LeadDraft {',
              crm,
              count=1,
              flags=re.S,
          )

          crm_path.write_text(crm, encoding='utf-8')

          migration = Path('supabase/migrations/202605270003_cleanup_pdf_offer_schema.sql')
          migration.write_text('''alter table public.crm_oferty
  drop column if exists podsumowanie_rozmowy,
  drop column if exists potrzeby_klienta,
  drop column if exists opis_pakietu,
  drop column if exists cena_standard,
  drop column if exists cena_premium,
  drop column if exists cena_wdrozenia,
  drop column if exists zakres;
''', encoding='utf-8')
          PY
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-crm-pdf-cleanup.yml
          git add src/app/crm/page.tsx supabase/migrations/202605270003_cleanup_pdf_offer_schema.sql
          git commit -m "Zastosuj porzadki ofert PDF"
          git push
