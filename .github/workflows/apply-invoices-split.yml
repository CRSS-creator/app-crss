name: Apply invoices split patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'Apply invoices split') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch invoices split
        run: |
          node <<'NODE'
          const fs = require('fs');
          const workflowPath = '.github/workflows/apply-invoices-split.yml';

          function write(path, content) {
            fs.writeFileSync(path, content, 'utf8');
          }

          const layoutPath = 'src/components/AppLayout.tsx';
          let layout = fs.readFileSync(layoutPath, 'utf8');
          layout = layout.replace('import SettlementBillingModelBridge from "@/components/SettlementBillingModelBridge";\n', '');
          if (!layout.includes('href: "/faktury"')) {
            layout = layout.replace(
              '      { href: "/crm/umowy", label: "Umowy", icon: FileText, page: "umowy" },\n',
              '      { href: "/crm/umowy", label: "Umowy", icon: FileText, page: "umowy" },\n      { href: "/faktury", label: "Faktury", icon: FileText, page: "faktury" },\n'
            );
          }
          layout = layout.replace('        {activePage === "rozliczenia" && <SettlementBillingModelBridge />}\n', '');
          write(layoutPath, layout);

          const servicePath = 'src/lib/monthlySettlementsService.ts';
          let service = fs.readFileSync(servicePath, 'utf8');
          service = service.replace('  model_fakturowania: string | null;\n', '');
          service = service.replace('  faktura_wystawiona: boolean;\n', '');
          service = service.replace('  faktura_wystawiona?: boolean;\n', '');
          service = service.replace('    model_fakturowania,\n', '');
          write(servicePath, service);

          const settlementsPath = 'src/app/rozliczenia/page.tsx';
          let text = fs.readFileSync(settlementsPath, 'utf8');
          text = text.replace('  const [invoiceFilter, setInvoiceFilter] = useState(EMPTY_FILTER);\n', '');
          text = text.replace(/\n    const matchesInvoice = invoiceFilter === EMPTY_FILTER \|\| \(invoiceFilter === "wystawiona" \? settlement\.faktura_wystawiona : !settlement\.faktura_wystawiona\);\n    return matchesSearch && matchesStatus && matchesInvoice;/, '\n    return matchesSearch && matchesStatus;');
          text = text.replace(/\n  const lockedCount = settlements\.filter\(\(settlement\) => settlement\.faktura_wystawiona\)\.length;/, '');
          text = text.replace('    if (settlement.faktura_wystawiona) return;\n', '');
          text = text.replace(/\n  async function markInvoiceIssued\(settlement: MonthlySettlement\) \{[\s\S]*?\n  async function toggleRecurringTimer/, '\n  async function toggleRecurringTimer');
          text = text.replace(/\n        <SummaryCard label="Faktury wystawione" value=\{lockedCount\} \/>/, '');
          text = text.replace(/\n          <select style=\{filterStyle\} value=\{invoiceFilter\} onChange=\{\(event\) => setInvoiceFilter\(event\.target\.value\)\}>[\s\S]*?\n          <\/select>/, '');
          text = text.replace(
            '<thead><tr><Th width="210px">Klient</Th><Th width="230px">Status</Th><Th width="130px">L. dokumentów</Th><Th width="140px">L. pracowników</Th><Th width="155px">L. zleceniobiorców</Th><Th width="150px">Zadania cykliczne</Th><Th width="135px">Faktura</Th><Th width="120px">Akcje</Th></tr></thead>',
            '<thead><tr><Th width="230px">Klient</Th><Th width="250px">Status</Th><Th width="140px">L. dokumentów</Th><Th width="150px">L. pracowników</Th><Th width="170px">L. zleceniobiorców</Th><Th width="170px">Zadania cykliczne</Th><Th width="120px">Akcje</Th></tr></thead>'
          );
          text = text.replace(/\n                  const locked = settlement\.faktura_wystawiona;/g, '');
          text = text.replace(/disabled=\{locked \|\| savingId === settlement\.id\}/g, 'disabled={savingId === settlement.id}');
          text = text.replace(/disabled=\{locked \|\| saving\}/g, 'disabled={saving}');
          text = text.replace(/disabled=\{locked\}/g, 'disabled={false}');
          text = text.replace(/\n\s*<Td><span style=\{locked \? invoiceIssuedStyle : invoiceOpenStyle\}>\{locked \? "Wystawiona" : "Nie wystawiona"\}<\/span><\/Td>/g, '');
          text = text.replace('          onInvoice={markInvoiceIssued}\n', '');
          text = text.replace(
            'function SettlementDrawer({ settlement, progress, recurringTasks, activeTimers, onClose, onSave, onInvoice, onToggleRecurringTimer, saving }: {',
            'function SettlementDrawer({ settlement, progress, recurringTasks, activeTimers, onClose, onSave, onToggleRecurringTimer, saving }: {'
          );
          text = text.replace('  onInvoice: (settlement: MonthlySettlement) => void;\n', '');
          text = text.replace('  const locked = settlement.faktura_wystawiona;\n', '');
          text = text.replace(/\n\s*\{locked && <div style=\{lockedNoticeStyle\}>Rozliczenie jest zablokowane, ponieważ faktura została wystawiona\.<\/div>\}/, '');
          text = text.replace(/\n\s*<section style=\{drawerSectionStyle\}><h3 style=\{drawerSectionTitleStyle\}>Faktura<\/h3><div style=\{invoiceRowStyle\}>[\s\S]*?<\/section>/, '');
          text = text.replace('const summaryGridStyle: CSSProperties = { display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: "18px", marginBottom: "24px" };', 'const summaryGridStyle: CSSProperties = { display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: "18px", marginBottom: "24px" };');
          text = text.replace('const tableStyle: CSSProperties = { width: "100%", minWidth: "1270px", borderCollapse: "collapse", tableLayout: "fixed" };', 'const tableStyle: CSSProperties = { width: "100%", minWidth: "1120px", borderCollapse: "collapse", tableLayout: "fixed" };');
          for (const name of ['invoiceIssuedStyle', 'invoiceOpenStyle', 'lockButtonStyle', 'lockedNoticeStyle', 'invoiceRowStyle']) {
            text = text.replace(new RegExp('\\nconst ' + name + ': CSSProperties = \\{[^\\n]+\\};', 'g'), '');
          }
          write(settlementsPath, text);

          fs.rmSync(workflowPath, { force: true });
          NODE

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AppLayout.tsx src/app/rozliczenia/page.tsx src/lib/monthlySettlementsService.ts .github/workflows/apply-invoices-split.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply invoices split"
            git push
          fi
