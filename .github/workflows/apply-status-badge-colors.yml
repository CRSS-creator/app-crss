name: Apply status badge color updates

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-status-badge-colors.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch status badges
        run: |
          python - <<'PY'
          from pathlib import Path

          tasks_path = Path('src/app/zadania/page.tsx')
          tasks = tasks_path.read_text(encoding='utf-8')
          old_status = '''function statusBadgeStyle(status: TaskStatus): React.CSSProperties {
            if (status === "zrobione") return { background: "#dcfce7", color: "#166534", borderColor: "#bbf7d0" };
            if (status === "w_trakcie") return { background: "#dbeafe", color: "#1d4ed8", borderColor: "#bfdbfe" };
            if (status === "anulowane") return { background: "#f1f5f9", color: "#64748b", borderColor: "#cbd5e1" };
            return { background: "#fef3c7", color: "#92400e", borderColor: "#fde68a" };
          }'''
          new_status = '''function statusBadgeStyle(status: TaskStatus): React.CSSProperties {
            if (status === "zrobione") return { background: "#e7f6ec", color: "#16a34a", borderColor: "transparent" };
            if (status === "w_trakcie") return { background: "#e8eef8", color: colors.navy, borderColor: "transparent" };
            if (status === "anulowane") return { background: "#f1f5f9", color: "#64748b", borderColor: "transparent" };
            return { background: "#f3f5f9", color: colors.navy, borderColor: "transparent" };
          }'''
          old_priority = '''function priorityBadgeStyle(priority: TaskPriority): React.CSSProperties {
            if (priority === "pilne") return { background: "#fee2e2", color: "#b91c1c", borderColor: "#fecaca" };
            if (priority === "wysoki") return { background: "#ffedd5", color: "#c2410c", borderColor: "#fed7aa" };
            if (priority === "niski") return { background: "#ecfdf5", color: "#047857", borderColor: "#bbf7d0" };
            return { background: "#eef2ff", color: "#3730a3", borderColor: "#c7d2fe" };
          }'''
          new_priority = '''function priorityBadgeStyle(priority: TaskPriority): React.CSSProperties {
            if (priority === "pilne") return { background: "#fde8ea", color: colors.red, borderColor: "transparent" };
            if (priority === "wysoki") return { background: "#fff3df", color: "#b45309", borderColor: "transparent" };
            if (priority === "niski") return { background: "#e7f6ec", color: "#16a34a", borderColor: "transparent" };
            return { background: "#e8eef8", color: colors.navy, borderColor: "transparent" };
          }'''
          for old, new in [(old_status, new_status), (old_priority, new_priority)]:
            if old not in tasks:
              raise SystemExit(f'Missing task pattern: {old[:60]}')
            tasks = tasks.replace(old, new)
          tasks_path.write_text(tasks, encoding='utf-8')

          crm_path = Path('src/app/crm/page.tsx')
          crm = crm_path.read_text(encoding='utf-8')
          replacements = [
            ('{lead.status || "Brak statusu"}', '<LeadStatusBadge status={lead.status} />'),
            ('<Badge>{lead.status || "Brak"}</Badge>', '<LeadStatusBadge status={lead.status} />'),
          ]
          for old, new in replacements:
            if old not in crm:
              raise SystemExit(f'Missing CRM pattern: {old}')
            crm = crm.replace(old, new)
          badge_function = '''function Badge({ children }: { children: React.ReactNode }) {
            return <span style={badgeStyle}>{children}</span>;
          }'''
          status_function = '''function Badge({ children }: { children: React.ReactNode }) {
            return <span style={badgeStyle}>{children}</span>;
          }

          function LeadStatusBadge({ status }: { status: string | null }) {
            return <span style={{ ...badgeStyle, ...leadStatusBadgeStyle(status) }}>{leadStatusLabel(status)}</span>;
          }

          function leadStatusLabel(status: string | null) {
            if (!status) return "Brak";
            return STATUSES.find((item) => item.value === status)?.label || status.charAt(0).toUpperCase() + status.slice(1);
          }

          function leadStatusBadgeStyle(status: string | null): React.CSSProperties {
            if (status === "wygrana") return { background: "#e7f6ec", color: "#16a34a" };
            if (status === "przegrana") return { background: "#fde8ea", color: colors.red };
            if (status === "otwarta") return { background: "#e8eef8", color: colors.navy };
            return { background: "#f3f5f9", color: colors.navy };
          }'''
          if badge_function not in crm:
            raise SystemExit('Missing Badge function in CRM')
          crm = crm.replace(badge_function, status_function)
          crm_path.write_text(crm, encoding='utf-8')

          workflow_path = Path('.github/workflows/apply-status-badge-colors.yml')
          workflow_path.unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/zadania/page.tsx src/app/crm/page.tsx .github/workflows/apply-status-badge-colors.yml
          git commit -m "Style task and CRM status badges"
          git push
