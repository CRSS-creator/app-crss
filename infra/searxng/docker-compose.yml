services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: app-crss-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_BIND:-127.0.0.1}:${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng:rw
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://localhost:8080/}"
      SEARXNG_SECRET: "${SEARXNG_SECRET}"
      UWSGI_WORKERS: "2"
      UWSGI_THREADS: "4"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  searxng-cache:
